[mypy]
python_version = 3.11
ignore_missing_imports = True
no_implicit_optional = False
allow_untyped_calls = True
allow_untyped_defs = True
warn_return_any = False
warn_unused_ignores = False
disable_error_code = assignment, arg-type, return-value, attr-defined, misc, union-attr, index, var-annotated, abstract, no-redef, list-item, name-defined, call-overload

[mypy-app.main]
ignore_errors = True

[mypy-app.providers.*]
ignore_errors = True

[mypy-app.services.agents.*]
ignore_errors = True
