services:
  postgres:
    image: postgres:16
    container_name: nexora-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora123
      POSTGRES_DB: nexora_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: nexora-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexora.ai
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data:
